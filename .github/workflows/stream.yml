name: 24Stream (single image)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [continue-stream]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: youtube-stream
  cancel-in-progress: false

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo (lấy ảnh)
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Stream to YouTube (1 ảnh tĩnh + tự retry khi crash)
        env:
          STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
          IMAGE_PATH: images/background.webp
        run: |
          END_TIME=$(( $(date +%s) + 18000 ))   # 5 tiếng

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Đã đủ 5 tiếng cho job này, dừng lại để chuyển job kế tiếp."
              break
            fi

            REMAINING=$(( END_TIME - NOW ))
            echo "▶️ $(date): Khởi động ffmpeg, còn ${REMAINING}s trong job này"

            timeout --signal=SIGINT "$REMAINING" ffmpeg -re -loop 1 -i "$IMAGE_PATH" \
              -re -f lavfi -i anullsrc=cl=stereo:r=44100 \
              -c:v libx264 -preset veryfast -tune stillimage \
              -b:v 4500k -minrate 4500k -maxrate 4500k -bufsize 9000k \
              -x264opts nal-hrd=cbr -pix_fmt yuv420p -g 60 -r 30 -vsync cfr \
              -c:a aac -b:a 128k \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            EXIT_CODE=$?
            echo "⏹️ $(date): ffmpeg dừng với exit code $EXIT_CODE"

            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Dừng đúng lịch (hết 5 tiếng), không phải crash."
              break
            else
              echo "⚠️ ffmpeg dừng SỚM (còn $(( END_TIME - NOW ))s) — nghi ngờ crash, tự khởi động lại sau 5s..."
              sleep 5
            fi
          done

          echo "Chờ 15s để YouTube giải phóng ingestion cũ..."
          sleep 15

      - name: Trigger job kế tiếp
        if: always()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"continue-stream"}'
