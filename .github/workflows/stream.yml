name: 24Stream (24/7 Optimized)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [continue-stream]
  schedule:
    # Cứ mỗi 6 tiếng tự động kích hoạt một luồng mới dự phòng (nếu luồng cũ bị đứt)
    - cron: '0 */6 * * *'

concurrency:
  group: youtube-stream
  # QUAN TRỌNG: Đổi thành true. Khi job mới (từ cron hoặc API) chạy lên, 
  # nó sẽ TỰ ĐỘNG NGẮT job cũ đang chạy để nối đuôi ngay lập tức, YouTube không bị ngắt stream.
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340 # Giới hạn an toàn trước mức 360 phút của GitHub

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
          IMAGE_PATH: images/1.jpeg
        run: |
          # Thiết lập chạy trong 5 tiếng 30 phút (19800 giây) để gối đầu an toàn
          END_TIME=$(( $(date +%s) + 19800 ))

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Đã chạy đủ thời gian an toàn cho job này. Chuẩn bị bàn giao."
              break
            fi

            REMAINING=$(( END_TIME - NOW ))
            echo "▶️ $(date): Khởi động FFmpeg. Thời gian còn lại: ${REMAINING} giây."

            # Tối ưu lại FFmpeg cho ảnh tĩnh: Giảm khung hình xuống 20fps để nhẹ CPU, giữ bitrate ổn định
            timeout --signal=SIGINT "$REMAINING" ffmpeg -re -loop 1 -i "$IMAGE_PATH" \
              -f lavfi -i anullsrc=cl=stereo:r=44100 \
              -c:v libx264 -preset ultrafast -tune stillimage \
              -b:v 4000k -maxrate 4000k -bufsize 8000k \
              -pix_fmt yuv420p -g 40 -r 20 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            EXIT_CODE=$?
            echo "⏹️ FFmpeg dừng với mã thoát: $EXIT_CODE"

            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              break
            else
              echo "⚠️ Luồng bị ngắt sớm do sự cố mạng/YouTube ngắt kết nối. Thử lại sau 5 giây..."
              sleep 5
            fi
          done

      - name: Kích hoạt Luồng Tiếp Theo (Gối Đầu)
        # Chỉ tự động kích hoạt tiếp nếu job này kết thúc thành công (không bị Cancel thủ công)
        if: success()
        run: |
          echo "🔄 Đang gọi API để kích hoạt job tiếp theo..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"continue-stream"}'
          
          # Chờ 10s để lệnh dispatch được gửi đi an toàn trước khi kết thúc job cũ
          sleep 10
