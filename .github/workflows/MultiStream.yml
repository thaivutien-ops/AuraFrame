name: 24-7 YouTube Stream (image slideshow)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [continue-stream]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: youtube-stream
  # Bật true để job mới (từ cron/API) tự động thay thế job cũ, giúp gối đầu luồng không bị ngắt kết nối
  cancel-in-progress: true

env:
  JOB_DURATION_SECONDS: 19800 # Thiết lập chạy 5 tiếng 30 phút giống file Single để gối đầu an toàn

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Stream to YouTube (Slideshow lặp vô hạn)
        env:
          STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
        run: |
          END_TIME=$(( $(date +%s) + JOB_DURATION_SECONDS ))

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Đã chạy đủ thời gian an toàn cho job này. Chuẩn bị bàn giao."
              break
            fi

            REMAINING=$(( END_TIME - NOW ))
            echo "▶️ $(date): Khởi động FFmpeg Slideshow. Thời gian còn lại: ${REMAINING} giây."

            # THÔNG SỐ CẤU HÌNH QUAN TRỌNG:
            # 1. -framerate 0.05: Cứ 20 giây sẽ tự chuyển sang ảnh .webp tiếp theo (1 / 0.05 = 20s). Bạn có thể đổi thành 0.1 nếu muốn 10s đổi 1 ảnh.
            # 2. -stream_loop -1: Tự động lặp lại danh sách ảnh từ đầu sau khi chạy hết thư mục.
            # 3. -vf scale...pad...: Tự động co giãn + chèn viền đen nếu ảnh lệch size (tránh crash stream khi đổi ảnh khác độ phân giải).
            
            stdbuf -oL -eL timeout --signal=SIGINT "$REMAINING" ffmpeg -re -framerate 0.05 -stream_loop -1 -pattern_type glob -i 'images/*.webp' \
              -f lavfi -i anullsrc=cl=stereo:r=44100 \
              -c:v libx264 -preset ultrafast -tune stillimage \
              -b:v 4000k -maxrate 4000k -bufsize 8000k \
              -pix_fmt yuv420p -g 40 -r 20 \
              -c:a aac -b:a 128k -ar 44100 \
              -progress pipe:1 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            EXIT_CODE=$?
            echo "⏹️ FFmpeg dừng với mã thoát: $EXIT_CODE"

            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              break
            else
              echo "⚠️ Luồng bị ngắt sớm do sự cố mạng/YouTube ngắt kết nối. Thử lại sau 5 giây..."
              sleep 5
            fi
          done

      - name: Kích hoạt Luồng Tiếp Theo (Gối Đầu)
        if: success()
        run: |
          echo "🔄 Đang gọi API để kích hoạt job tiếp theo..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"continue-stream"}'
          
          # Chờ 10s để lệnh dispatch được gửi đi an toàn trước khi kết thúc job cũ
          sleep 10
