name: 24-7 YouTube Stream (image slideshow)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [continue-stream]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: youtube-stream
  # Bật true để job mới tự động ngắt và thay thế job cũ, giúp gối đầu luồng liên tục
  cancel-in-progress: true

env:
  JOB_DURATION_SECONDS: 19800 # Thời gian chạy 5 tiếng 30 phút để gối đầu an toàn

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Tạo danh sách ảnh chuẩn hóa
        run: |
          IMG_DIR="images"
          LIST_FILE="images_list.txt"
          > "$LIST_FILE"

          # Tìm toàn bộ file .webp trong thư mục images
          FILES=$(find "$IMG_DIR" -maxdepth 1 -type f -iname "*.webp" | sort -V)
          
          if [ -z "$FILES" ]; then
            echo "❌ Không tìm thấy ảnh .webp nào trong thư mục $IMG_DIR"
            exit 1
          fi

          # Ghi danh sách ảnh vào file txt, mỗi ảnh hiển thị cố định 15 giây
          for f in $FILES; do
            ABS_PATH=$(realpath "$f")
            echo "file '$ABS_PATH'" >> "$LIST_FILE"
            echo "duration 15" >> "$LIST_FILE"
          done
          
          # Quy tắc của FFmpeg concat: bắt buộc lặp lại file cuối cùng một lần nữa ở cuối danh sách
          LAST_FILE=$(echo "$FILES" | tail -n 1)
          ABS_LAST_PATH=$(realpath "$LAST_FILE")
          echo "file '$ABS_LAST_PATH'" >> "$LIST_FILE"
          
          echo "📊 Đã khởi tạo thành công danh sách ảnh phối cảnh."

      - name: Stream to YouTube (Tối ưu hóa không Scale)
        env:
          STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
        run: |
          END_TIME=$(( $(date +%s) + JOB_DURATION_SECONDS ))

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Đã chạy đủ thời gian an toàn cho job này. Chuẩn bị bàn giao."
              break
            fi

            REMAINING=$(( END_TIME - NOW ))
            echo "▶️ $(date): Khởi động FFmpeg Slideshow. Thời gian còn lại: ${REMAINING} giây."

            # Đã lược bỏ hoàn toàn bộ lọc -vf để giảm tải CPU về mức tối thiểu
            # Giữ nguyên preset ultrafast và các thông số encoding ổn định giống file Single
            stdbuf -oL -eL timeout --signal=SIGINT "$REMAINING" ffmpeg \
              -re -stream_loop -1 -f concat -safe 0 -i images_list.txt \
              -re -f lavfi -i anullsrc=cl=stereo:r=44100 \
              -c:v libx264 -preset ultrafast -tune stillimage \
              -b:v 4000k -maxrate 4000k -bufsize 8000k \
              -pix_fmt yuv420p -g 40 -r 20 \
              -c:a aac -b:a 128k -ar 44100 \
              -progress pipe:1 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            EXIT_CODE=$?
            echo "⏹️ FFmpeg dừng với mã thoát: $EXIT_CODE"

            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              break
            else
              echo "⚠️ Luồng bị ngắt sớm do mạng hoặc sự cố bên ngoài. Thử lại sau 5 giây..."
              sleep 5
            fi
          done

      - name: Kích hoạt Luồng Tiếp Theo (Gối Đầu)
        if: success()
        run: |
          echo "🔄 Đang gọi API để kích hoạt job tiếp theo..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"continue-stream"}'
          
          sleep 10
