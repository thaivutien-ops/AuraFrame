name: 24-7 YouTube Stream (image slideshow)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [continue-stream]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: youtube-stream
  # Đổi thành true để job mới thay thế job cũ một cách êm ái, tránh trùng stream key
  cancel-in-progress: true

env:
  JOB_DURATION_SECONDS: 19800 # Tăng lên 5 tiếng 30 phút giống file Single cho đồng bộ

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Tạo danh sách ảnh chuẩn FFmpeg
        run: |
          IMG_DIR="images"
          LIST_FILE="images_list.txt"
          > "$LIST_FILE"

          # Tìm toàn bộ file .webp
          FILES=$(find "$IMG_DIR" -maxdepth 1 -type f -iname "*.webp" | sort -V)
          NUM_IMAGES=$(echo "$FILES" | wc -l)

          if [ -z "$FILES" ] || [ "$NUM_IMAGES" -eq 0 ]; then
            echo "❌ Không tìm thấy ảnh .webp trong thư mục $IMG_DIR"
            exit 1
          fi

          # Tính thời gian mỗi ảnh (đảm bảo tối thiểu 5s mỗi ảnh để FFmpeg xử lý kịp)
          IMAGE_DURATION=$(( JOB_DURATION_SECONDS / NUM_IMAGES ))
          if [ "$IMAGE_DURATION" -lt 5 ]; then
            IMAGE_DURATION=5
          fi
          
          echo "📊 Số ảnh: $NUM_IMAGES | ${IMAGE_DURATION}s/ảnh"

          # Tạo file list chuẩn cấu trúc FFmpeg concat
          for f in $FILES; do
            # Lấy đường dẫn tuyệt đối để tránh lỗi định dạng concat
            ABS_PATH=$(realpath "$f")
            echo "file '$ABS_PATH'" >> "$LIST_FILE"
            echo "duration $IMAGE_DURATION" >> "$LIST_FILE"
          done
          
          # Quy tắc bắt buộc của FFmpeg concat: lặp lại file cuối cùng một lần nữa nhưng không có duration
          LAST_FILE=$(echo "$FILES" | tail -n 1)
          ABS_LAST_PATH=$(realpath "$LAST_FILE")
          echo "file '$ABS_LAST_PATH'" >> "$LIST_FILE"
          
          echo "--- Nội dung file list ---"
          cat "$LIST_FILE"

      - name: Stream to YouTube (loop ảnh + tự retry khi crash)
        env:
          STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
        run: |
          END_TIME=$(( $(date +%s) + JOB_DURATION_SECONDS ))

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Đủ thời gian job. Chuẩn bị bàn giao."
              break
            fi

            REMAINING=$(( END_TIME - NOW ))
            echo "▶️ $(date): Khởi động FFmpeg Slideshow. Còn lại: ${REMAINING}s"

            # Đã tối ưu hóa thông số: dùng nhẹ CPU (ultrafast), giảm xuống 20fps giống file single để ổn định luồng
            timeout --signal=SIGINT "$REMAINING" ffmpeg -re -f concat -safe 0 -stream_loop -1 -i images_list.txt \
              -f lavfi -i anullsrc=cl=stereo:r=44100 \
              -c:v libx264 -preset ultrafast -tune stillimage \
              -b:v 4000k -maxrate 4000k -bufsize 8000k \
              -pix_fmt yuv420p -g 40 -r 20 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            EXIT_CODE=$?
            echo "⏹️ FFmpeg dừng, mã thoát: $EXIT_CODE"

            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              break
            else
              echo "⚠️ Dừng sớm do sự cố mạng/FFmpeg crash. Thử lại sau 5s..."
              sleep 5
            fi
          done

      - name: Kích hoạt Luồng Tiếp Theo (Gối Đầu)
        if: success()
        run: |
          echo "🔄 Đang gọi API để kích hoạt job tiếp theo..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"continue-stream"}'
          
          sleep 10
