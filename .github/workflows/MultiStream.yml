name: 24-7 YouTube Stream (filter_complex concat)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [continue-stream]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: youtube-stream
  cancel-in-progress: false

env:
  JOB_DURATION_SECONDS: 120
  IMAGE_DURATION: 10

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Stream to YouTube (1 process ffmpeg, filter_complex concat)
        env:
          STREAM_KEY: ${{ secrets.YT_STREAM_KEY }}
        run: |
          END_TIME=$(( $(date +%s) + JOB_DURATION_SECONDS ))

          mapfile -t IMAGES < <(find images -maxdepth 1 -type f -iname "*.webp" | sort -V)
          NUM_IMAGES=${#IMAGES[@]}

          if [ "$NUM_IMAGES" -eq 0 ]; then
            echo "❌ Không tìm thấy ảnh .webp trong thư mục images/"
            exit 1
          fi
          echo "📊 Tìm thấy $NUM_IMAGES ảnh, mỗi ảnh ${IMAGE_DURATION}s"

          while true; do
            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Đủ thời gian job."
              break
            fi

            INPUT_ARGS=()
            FILTER_INPUTS=""
            for i in "${!IMAGES[@]}"; do
              INPUT_ARGS+=(-re -loop 1 -t "$IMAGE_DURATION" -i "${IMAGES[$i]}")
              FILTER_INPUTS+="[${i}:v]"
            done
            
            FILTER_COMPLEX="${FILTER_INPUTS}concat=n=${NUM_IMAGES}:v=1:a=0[outv]"
            AUDIO_INPUT_INDEX=$NUM_IMAGES
            
            REMAINING=$(( END_TIME - NOW ))
            echo "▶️ $(date): Khởi động ffmpeg cho $NUM_IMAGES ảnh, còn ${REMAINING}s"
            
            timeout --signal=SIGINT "$REMAINING" ffmpeg \
              "${INPUT_ARGS[@]}" \
              -re -f lavfi -i anullsrc=cl=stereo:r=44100 \
              -filter_complex "$FILTER_COMPLEX" \
              -map "[outv]" -map "${AUDIO_INPUT_INDEX}:a" \
              -c:v libx264 -preset veryfast -tune stillimage \
              -b:v 4500k -maxrate 4500k -bufsize 9000k \
              -pix_fmt yuv420p -g 60 -r 30 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

            EXIT_CODE=$?
            echo "⏹️ ffmpeg dừng, exit code $EXIT_CODE"

            NOW=$(date +%s)
            if [ "$NOW" -ge "$END_TIME" ]; then
              echo "✅ Dừng đúng lịch."
              break
            else
              echo "⚠️ Dừng sớm — retry sau 3s..."
              sleep 3
            fi
          done

          echo "Chờ 15s để YouTube giải phóng ingestion cũ..."
          sleep 15

      - name: Trigger job kế tiếp
        if: ${{ !cancelled() }}
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"continue-stream"}'
          sleep 5
